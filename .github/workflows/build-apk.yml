name: Build Android APK

on:
  push:
    branches: [ main ]  # 推送到main分支时自动打包
  workflow_dispatch:    # 支持手动触发打包

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk git zip unzip libffi-dev libssl-dev
        pip install --user buildozer cython  # 新增 cython 依赖

    - name: Build APK
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shop-video-apk
        path: bin/*.apk  # 打包好的APK会上传到这里
